name: release

# A tag is only a release request. Tests, dependency audit, version alignment,
# archive installation, offline indexing and checksums must all pass first.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lawiki tests
        working-directory: lawiki
        run: uv run --python 3.12 --with pytest --with pytest-cov python -m pytest skill/lawiki scripts test_install.py -q --cov=skill/lawiki/lint --cov=skill/lawiki/tools --cov-config=../.coveragerc --cov-fail-under=80
      - name: Makeitdown tests
        working-directory: makeitdown
        run: uv run --python 3.12 --extra dev --with pytest-cov python -m pytest tests -q --cov=makeitdown --cov-config=../.coveragerc --cov-fail-under=80
      - name: RAG retriever tests
        working-directory: rag-retriever
        run: uv run --python 3.12 --group dev --with pytest-cov python -m pytest tests -q --cov=rag_retriever --cov-config=../.coveragerc --cov-fail-under=80
      - name: Cross-module product acceptance
        run: uv run --python 3.12 --with-editable ./makeitdown --with-editable ./rag-retriever --with pytest python -m pytest tests -q
      - name: Static correctness gate
        if: runner.os == 'Linux'
        run: uvx ruff check --select E9,F .

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Export locked runtime dependencies
        run: |
          uv export --project makeitdown --frozen --no-dev --no-emit-project --no-hashes --output-file makeitdown-audit.txt
          uv export --project rag-retriever --frozen --no-dev --no-emit-project --no-hashes --output-file rag-audit.txt
      - name: Audit known vulnerabilities
        run: |
          uvx pip-audit -r makeitdown-audit.txt
          uvx pip-audit -r rag-audit.txt

  bundle:
    needs: [verify, dependency-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5

      - name: Build source bundle
        run: python lawiki/scripts/build_bundle.py --version "${GITHUB_REF_NAME#v}"

      - name: Install and smoke-test source bundle
        run: |
          ver="${GITHUB_REF_NAME#v}"
          root="$RUNNER_TEMP/source-smoke"
          mkdir -p "$root"
          unzip -q "lawiki/dist/anydocsmarked-v${ver}.zip" -d "$root"
          bundle="$root/anydocsmarked-v${ver}"
          export UV_TOOL_DIR="$RUNNER_TEMP/source-tools"
          export UV_TOOL_BIN_DIR="$RUNNER_TEMP/source-bin"
          export PATH="$UV_TOOL_BIN_DIR:$PATH"
          export ANYDOCS_PYPI_INDEX=""
          python "$bundle/install.py" --ocr cloud
          "$UV_TOOL_BIN_DIR/makeitdown" --help
          "$UV_TOOL_BIN_DIR/rag-retriever" --help
          uvx pip-audit \
            --path "$UV_TOOL_DIR/makeitdown/lib/python3.12/site-packages" \
            --path "$UV_TOOL_DIR/rag-retriever/lib/python3.12/site-packages"
          mkdir -p "$root/lint-case/wiki"
          python "$bundle/skill/lawiki/lint/lint.py" extract "$root/lint-case" | grep -q '\[\]'

      - name: Vendor offline embedding and tokenizer assets
        run: |
          python -m pip install ./rag-retriever
          python rag-retriever/scripts/fetch_bundled_model.py

      - name: Build offline bundle
        run: python lawiki/scripts/build_bundle.py --version "${GITHUB_REF_NAME#v}" --offline

      - name: Install offline bundle and run a real disconnected index
        run: |
          ver="${GITHUB_REF_NAME#v}"
          zip="lawiki/dist/anydocsmarked-v${ver}-offline.zip"
          unzip -l "$zip" | grep -Eq "vendor/rag-retriever/rag_retriever/_models/.*\.onnx"
          root="$RUNNER_TEMP/offline-smoke"
          mkdir -p "$root"
          unzip -q "$zip" -d "$root"
          bundle="$root/anydocsmarked-v${ver}"
          export UV_TOOL_DIR="$RUNNER_TEMP/offline-tools"
          export UV_TOOL_BIN_DIR="$RUNNER_TEMP/offline-bin"
          export PATH="$UV_TOOL_BIN_DIR:$PATH"
          export ANYDOCS_PYPI_INDEX=""
          python "$bundle/install.py" --ocr cloud --skip-makeitdown
          mkdir -p "$root/case/_md"
          printf '%s\n' '离线发布探针：甲方向乙方借款人民币五万元。' > "$root/case/_md/probe.md"
          HF_HUB_OFFLINE=1 TRANSFORMERS_OFFLINE=1 "$UV_TOOL_BIN_DIR/rag-retriever" \
            --data-dir "$root/case/.rag" index "$root/case/_md" --source-root "$root/case" \
            | tee "$root/index-result.json"
          python -c 'import json,sys; r=json.load(open(sys.argv[1], encoding="utf-8")); assert r["files_indexed"] == 1 and r["files_skipped"] == 0, r' \
            "$root/index-result.json"

      - name: Verify checksums
        working-directory: lawiki/dist
        run: sha256sum -c SHA256SUMS.txt

      - name: Publish verified release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lawiki/dist/anydocsmarked-*.zip
            lawiki/dist/SHA256SUMS.txt
          generate_release_notes: true
